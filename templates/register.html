<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – TrendAnalyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    /* Keep specific styles, variables will cascade from style.css or be overwritten */
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100%;
      background: radial-gradient(circle at center, rgba(56, 189, 248, 0.1), transparent 70%);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem;
      background-color: var(--card-bg);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .login-header {
      text-align: center;
      margin-bottom: 1rem;
    }

    .login-header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-size: 0.875rem;
      font-weight: 500;
    }

    .form-control {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
    }

    .btn-block {
      width: 100%;
      margin-top: 1rem;
    }

    .login-footer {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .login-footer a {
      color: var(--accent-color);
      text-decoration: none;
      font-weight: 500;
    }

    .login-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>TrendAnalyzer</h1>
        <p>Create your account</p>
      </div>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input id="name" type="text" class="form-control" required autofocus placeholder="John Doe">
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input id="email" type="email" class="form-control" required placeholder="name@example.com">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" class="form-control" required placeholder="••••••••">
        </div>

        <button type="submit" class="btn-primary btn-block">
          Register
        </button>

        <button type="button" class="btn-google" id="googleBtn">
          <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
            <path fill="#FFC107"
              d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z" />
            <path fill="#FF3D00"
              d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z" />
            <path fill="#4CAF50"
              d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z" />
            <path fill="#1976D2"
              d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z" />
          </svg>
          Sign up with Google
        </button>

        <div class="login-footer">
          Already have an account? <a href="/login">Login</a>
        </div>
      </form>
    </div>
  </div>

  <div id="messageModal" class="modal">
    <div class="modal-content" style="max-width: 350px;">
      <h3 id="msgModalTitle">Message</h3>
      <div class="modal-body">
        <p id="msgModalContent" style="text-align: center; color: var(--text-primary); font-size: 1.1rem;"></p>
      </div>
      <div class="modal-actions" style="justify-content: center; margin-top: 1rem;">
        <button class="btn-primary" onclick="window.closeMessageModal()">OK</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth, createUserWithEmailAndPassword, signInWithGoogle } from "/static/firebase-auth.js";

    let redirectUrl = null;

    // Modal functions
    function showMessageModal(title, message, isError = false, redirect = null) {
      const modal = document.getElementById('messageModal');
      const titleEl = document.getElementById('msgModalTitle');
      const contentEl = document.getElementById('msgModalContent');

      titleEl.textContent = title;
      contentEl.textContent = message;
      redirectUrl = redirect;

      modal.classList.add('active');
    }

    // Expose close helper to window
    window.closeMessageModal = function () {
      document.getElementById('messageModal').classList.remove('active');
      if (redirectUrl) {
        window.location.href = redirectUrl;
      }
    };

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.querySelector('.btn-primary');
      const originalText = btn.innerText;

      try {
        btn.innerText = 'Creating Account...';
        btn.disabled = true;

        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        console.log("Registered:", userCredential.user.email);

        // Success
        showMessageModal("Success!", "Account created successfully! Please login.", false, "/login");

      } catch (error) {
        console.error("Registration error:", error);

        // Friendly error messages
        let msg = "Registration failed. Please try again.";
        if (error.code === 'auth/email-already-in-use') {
          msg = "This email is already registered. Please login instead.";
        } else if (error.code === 'auth/weak-password') {
          msg = "Password should be at least 6 characters.";
        } else if (error.message) {
          msg = error.message;
        }

        showMessageModal("Registration Failed", msg, true);
        btn.innerText = originalText;
        btn.disabled = false;
        btn.disabled = false;
      }
    });

    document.getElementById('googleBtn').addEventListener('click', async () => {
      const btn = document.getElementById('googleBtn');
      const originalHtml = btn.innerHTML;

      try {
        btn.innerHTML = 'Signing in...';
        btn.disabled = true;

        const userCredential = await signInWithGoogle();
        console.log("Logged in with Google:", userCredential.user.email);

        // Success
        showMessageModal("Success!", "Account created/logged in successfully!", false, "/dashboard");

      } catch (error) {
        console.error("Google sign up error:", error);
        showMessageModal("Sign Up Failed", error.message || "Could not sign up with Google.", true);
        btn.innerHTML = originalHtml;
        btn.disabled = false;
      }
    });
  </script>
</body>

</html>
